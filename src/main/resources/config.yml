server:
  id: "proxy"
  capacity_cpu: 100.0
  headroom: 0.80
  capacity_ram_mb: 8192
  headroom_ram: 0.80

lstm:
  enabled: true
  base_url: "http://127.0.0.1:8900"
  timeout_ms: 1500

regression:
  intercept: 5.0
  beta:
    AFK: 0.05
    Build: 0.70
    Explorer: 0.40
    Explosive: 1.50
    PvP: 1.60
    Redstone: 1.40
    Social: 0.35
    Survival: 0.60
  ar:
    y_lag1: 0.20
    y_lag2: 0.10

unit_cost_cpu:
  AFK: 0.05
  Build: 0.70
  Explorer: 0.40
  Explosive: 1.50
  PvP: 1.60
  Redstone: 1.40
  Social: 0.35
  Survival: 0.60

unit_cost_ram_mb:
  AFK: 5
  Build: 30
  Explorer: 20
  Explosive: 25
  PvP: 35
  Redstone: 40
  Social: 15
  Survival: 28

autoscale:
  cpu_steps: [100, 200, 300]
  ram_steps_mb: [5000, 9000]
  cooldown_minutes: 20
  hysteresis:
    up: 2
    down: 3

placement:
  migrate_penalty: 0.5
  allow_over_ratio: 0.05
  score:
    cpu_weight: 0.6
    ram_weight: 0.4

mysql:
  url: "jdbc:mysql://127.0.0.1:3306/mc_analytics?useSSL=false&serverTimezone=UTC"
  username: "mc_user"
  password: "mc_pass"
  pool_size: 8

tables:
  comp: "server_comp_30m"
  load: "server_load_30m"
  pred: "player_type_pred"
  horizon: 6

# disable all if not using velocity server api
velocity:
  log_plan_only: true